version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unused
    - gocritic
    - errorlint
    - noctx
    - contextcheck
    - thelper
    - forcetypeassert
    - exhaustive
  settings:
    exhaustive:
      # A switch with an explicit default is treated as exhaustive. Many
      # switches here intentionally handle a subset and fall back to default.
      default-signifies-exhaustive: true
  exclusions:
    paths:
      - testdata
      - corpus

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/periplon/datjitgo
  exclusions:
    paths:
      - testdata
      - corpus

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags "-s -w" -o datjit-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/datjit
      - name: upload binary
        uses: actions/upload-artifact@v4
        with:
          name: datjit-${{ matrix.goos }}-${{ matrix.goarch }}
          path: datjit-${{ matrix.goos }}-${{ matrix.goarch }}

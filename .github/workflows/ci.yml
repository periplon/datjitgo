name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      # golangci-lint v2. install-mode goinstall builds the linter with the
      # go.mod-pinned toolchain so its build Go matches the module's `go`
      # directive; prebuilt binaries lag new Go releases and fail the skew check.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          install-mode: goinstall

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: make ci
        run: make ci
      - name: coverage
        run: make cover
      - name: upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
